<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST & TREACHERY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation">
        <div id="particles-js"></div>
        <div class="scanline"></div>
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="betraySound" src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>
    <audio id="trustSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div class="game-container">
        <section id="menu-screen" class="screen active">
            <h1 class="logo">TRUST <span>&</span> TREACHERY</h1>
            <div class="input-group">
                <input type="text" id="player-name" placeholder="შენი სახელი...">
                <button onclick="createRoom()" class="btn-primary">ოთახის შექმნა</button>
                <input type="text" id="room-code" placeholder="კოდი">
                <button onclick="joinRoom()" class="btn-secondary">შეერთება</button>
            </div>
        </section>

        <section id="lobby-screen" class="screen">
            <h2 class="room-id">ოთახი: <span id="display-room-code">#---</span></h2>
            <div class="player-list" id="player-list"></div>
            <button onclick="startGame()" class="btn-start">თამაშის დაწყება</button>
        </section>

        <section id="game-screen" class="screen">
            <div class="hud">
                <span>ქულა: <b id="my-points">10</b></span>
                <span>რაუნდი: 1/5</span>
            </div>
            <div class="main-card">
                <p>შენი საიდუმლო როლი:</p>
                <h2 id="role">მანიპულატორი</h2>
            </div>
            <div class="action-grid">
                <button onclick="makeDecision('trust')" class="btn-trust">ნდობა</button>
                <button onclick="makeDecision('betray')" class="btn-betray">ღალატი</button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
