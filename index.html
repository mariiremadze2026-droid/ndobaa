<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST & TREACHERY | ნდობა და ღალატი</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="scanline"></div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="betraySound" src="https://assets.mixkit.co/active_storage/sfx/212/212-preview.mp3"></audio>
    <audio id="trustSound" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio>

    <div class="game-container">
        <section id="menu-screen" class="screen active">
            <h1 class="logo">TRUST <span>&</span> TREACHERY</h1>
            <p class="tagline">ვერავის ენდობი. მარტო ვერ გაიმარჯვებ.</p>
            <button onclick="createRoom()" class="btn-primary">თამაშის დაწყება</button>
        </section>

        <section id="lobby-screen" class="screen">
            <h2>მოთამაშეები</h2>
            <div class="input-group">
                <input type="text" id="new-player-name" placeholder="სახელი...">
                <button onclick="addNewPlayer()" class="btn-secondary">დამატება +</button>
            </div>
            <div class="player-list" id="player-list"></div>
            <button onclick="startOfflineGame()" class="btn-start" id="start-game-btn" style="display:none;">რაუნდის დაწყება</button>
        </section>

        <section id="game-screen" class="screen">
            <div id="pass-device-screen">
                <h2 id="next-player-instruction">გადაეცი ტელეფონი: <span>...</span></h2>
                <button onclick="showSecretRole()" class="btn-primary">ჩემი როლის ნახვა</button>
            </div>

            <div id="role-reveal-screen" style="display:none;">
                <p>შენი როლი: <b id="current-player-role" class="neon-text">...</b></p>
                <p>შენი ქულები: <b id="my-points">10</b></p>
                <div class="action-box">
                    <p>რას აპირებ ამ რაუნდში?</p>
                    <button onclick="makeDecision('trust')" class="btn-trust">🤝 ნდობა</button>
                    <button onclick="makeDecision('betray')" class="btn-betray">😈 ღალატი</button>
                </div>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
